name: Add new chain PR
description: Template to provide information about the new chain
title: "[New chain]: "
labels: "[to-review]"
body: 
  - type: markdown 
    attributes:
      value: Please fill the following form
  - type: input
    id: chainid
    attributes:
      label: ChainId
      description: Provide the chainId (Only 1 chain id per PR)
    validations:
      required: true
  - type: input
    id: chainlist
    attributes:
      label: Chainlist
      description: The chain should be listed on chainlist.org, provide the link.
    validations:
      required: true
  - type: input
    id: rpc
    attributes:
      label: RPC URL
      description: Provide RPC URL for the chain (should be able to query atleast 10 requests per minute for automatic PR check).
    validations:
      required: true
  - type: checkboxes
    id: deployed
    attributes: 
      label: Contract deployed
      description: Confirm that the contracts are deployed on the chain, if not deploy with [safe-contracts](https://github.com/safe-global/safe-contracts)
      options:
        - label: I confirm that the contracts are deployed 
          required: true
  - type: dropdown
    id: versioning 
    attributes: 
      label: Version of contracts deployed
      description: What version of contracts are deployed? NOTE:One issue per version and one pull request per version
      multiple: false
      options: 
        - v1.3.0
        - v1.4.1
    validations:
      required: true
  - type: textarea
    id: relevant
    attributes:
      label: Relevant information
      description: Add any other relevant information like blockexplorer, any annotation...
